name: Flutter CI

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  checks:
    name: Analyze, Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

  android:
    name: Android APK + AAB
    runs-on: ubuntu-latest
    needs: checks
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK (github flavor)
        # GitHub 自分发包：github flavor，保留应用内一键自更新（REQUEST_INSTALL_PACKAGES）。
        # 只构建 arm64-v8a：2019 年后的安卓机几乎全是 arm64，一个包覆盖 99%+ 设备，
        # 相比 universal（打包 armeabi-v7a/arm64/x86_64 三套原生库）体积约减半。
        # 极老的 32 位机型装不了——已在 Release 说明中告知。
        run: flutter build apk --release --target-platform android-arm64 --flavor github

      - name: Build release App Bundle (play flavor)
        # Google Play 上架用 AAB：play flavor 移除 REQUEST_INSTALL_PACKAGES（Play 政策禁止
        # 应用自更新），并 --dart-define=SELF_UPDATE=false 隐藏应用内自更新入口。
        # 与 APK 同用 verifinRelease 签名；AAB 含全部 ABI，由 Play 按设备分发。
        run: flutter build appbundle --release --flavor play --dart-define=SELF_UPDATE=false

      - name: Prepare release artifacts
        shell: bash
        run: |
          mkdir -p release-artifacts
          short_sha="${GITHUB_SHA::7}"
          version_name="${GITHUB_REF_NAME}"
          cp build/app/outputs/flutter-apk/app-github-release.apk "release-artifacts/verifin-${version_name}-arm64-${short_sha}.apk"
          cp build/app/outputs/bundle/playRelease/app-play-release.aab "release-artifacts/verifin-${version_name}-${short_sha}.aab"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: verifin-android-release
          path: release-artifacts/*

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: android
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: verifin-android-release
          path: release-artifacts

      - name: Create pre-release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/**/*.apk
            release-artifacts/**/*.aab
          # 默认发预发布：不标记为 Latest，待真机测试通过后在 GitHub 手动改为正式版。
          prerelease: true
          make_latest: 'false'
          body: |
            ⚠️ 预发布（待验证）：此版本由 CI 自动构建，尚未经真机验收。

            📦 安装包为 **arm64-v8a** 架构，覆盖 2019 年后绝大多数安卓机型。极少数 32 位老设备可能无法安装。

            💡 本版含存储与性能优化，更新前建议先在「数据管理」里**导出一次备份**以防万一。
