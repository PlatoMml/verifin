name: Flutter CI

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  checks:
    name: Analyze, Test, Web Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build web
        run: flutter build web --pwa-strategy=none

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: verifin-web
          path: build/web

  android:
    name: Android APK
    runs-on: ubuntu-latest
    needs: checks
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Prepare APK artifact
        shell: bash
        run: |
          mkdir -p release-artifacts
          short_sha="${GITHUB_SHA::7}"
          version_name="${GITHUB_REF_NAME}"
          if [[ "${version_name}" == "main" ]]; then
            version_name="v1.0.0"
          fi
          cp build/app/outputs/flutter-apk/app-release.apk "release-artifacts/verifin-${version_name}-${short_sha}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: verifin-android-apk
          path: release-artifacts/*.apk

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: android
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: verifin-android-apk
          path: release-artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/**/*.apk
